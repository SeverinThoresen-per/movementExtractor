<!DOCTYPE html>
<html>
  <head>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.26.4/full/pyodide.js"></script>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <title>Movement Extractor</title>
  </head>
  <body>
  <div class="app">
    <header class="topbar">
      <div class="brand">Movement Extractor</div>
      <div class="top-actions">
        <a class="top-btn" href="downloadGuide.html">How to export emails</a>
      </div>
    </header>

    <!-- The topmost panel -->

    <main class="chat-panel">
      <div class="chat-window" id="chatWindow" role="log" aria-live="polite">
        <div class="message assistant centered">
          <div class="meta">Movement Extractor</div>
          <div>Upload a video file</div>
        </div>
      </div>

      <!-- The panel where the processed video can be downloaded from -->

      <div class="chat-window" id="chatWindow" role="log" aria-live="polite">
        <div class="message assistant centered">
          <div id="output">OUTPUT HERE!</div>
        </div>
      </div>

      <!-- The panel containing the slider for the percent of change that qualifies as movement -->

      <div class="chat-window" id="chatWindow" role="log" aria-live="polite">
        <div class="message assistant centered">
          <div id="output">Sensitivity : </div>
          <div>
            <input type="range" min="1" max="100" value="50" id="changeSlider" class="slider">
          </div>
          <div id = "changeSliderPercent">
          </div>
        </div>
      </div>

      <!-- The panel containing the slider for the amount of frames to skip for efficiency -->

      <div class="chat-window" id="chatWindow" role="log" aria-live="polite">
        <div class="message assistant centered">
          <div id="output">Frame Skipping : </div>
          <div>
            <input type="range" min="1" max="20" value="5" id="frameSlider" class="slider">
          </div>
          <div id = "frameSliderCount">
          </div>
        </div>
      </div>

      <!-- The panel containing the slider for the amount of compression -->

      <div class="chat-window" id="chatWindow" role="log" aria-live="polite">
        <div class="message assistant centered">
          <div id="output">Compression factor : </div>
          <div>
            <input type="range" min="1" max="100" value="50" id="compressionSlider" class="slider">
          </div>
          <div id = "compressionSliderPercent">
          </div>
        </div>
      </div>

      <!-- The panel at the bottom which accepts file input -->

      <section class="upload-card" aria-label="Upload email">
        <div class="meta">Upload email file</div>
        <div class="upload-row">
            <label class="file-chooser" for="fileInput">Choose file
              <input id="fileInput" type="file" name="file">
            </label>
        </div>
        <div class="hint" style="color:var(--muted);font-size:13px">Accepted: .eml, .msg — upload exported messages for analysis.</div>
      </section>
    </main>
  </div>

    <div id="downloadBox" role="status" aria-live="polite"></div>

  <script type="module">
    //Immediately load the starting slider bar percentages
    document.getElementById("changeSliderPercent").innerHTML = changeSlider.value + "% of pixels need to be different per frame to be considered movement";
    document.getElementById("compressionSliderPercent").innerHTML = compressionSlider.value + "% of pixels are preserved after compression";
    document.getElementById("frameSliderCount").innerHTML = "1 frame in every " + frameSlider.value + " is analyzed";

    async function runPython(file, change, compression, frame) {
      //starting instantiation variables
      let pyodide = await loadPyodide();
      let output = "";
      
      //Lets me catch the print statements inside the pyodide instance
      pyodide.setStdout({
        batched: (msg) => { output += msg + "\n"; }
      });

      // this is the code that actually transfers the file into the pyodide instance
      const fileData = await file.arrayBuffer();
      pyodide.FS.writeFile(file.name, new Uint8Array(fileData));

      //package imports
      await pyodide.loadPackage(["numpy", "pandas"]);
      await pyodide.loadPackage("opencv-python");

      //passing in global variables to the pyodide instance
      pyodide.globals.set("fileName", file.name);
      pyodide.globals.set("change", change);
      pyodide.globals.set("compression", compression);
      pyodide.globals.set("frame", frame);

      //python code
      await pyodide.runPythonAsync(`
        import cv2

        video = cv2.VideoCapture(fileName)

        fps = video.get(cv2.CAP_PROP_FPS)
        width = int(video.get(cv2.CAP_PROP_FRAME_WIDTH))
        height = int(video.get(cv2.CAP_PROP_FRAME_HEIGHT))

        new_width = int(width * int(compression) / 100)
        new_height = int(height * int(compression) / 100)

        out = cv2.VideoWriter(
            "processed.mp4",
            cv2.VideoWriter_fourcc(*'mp4v'),
            fps,
            (new_width, new_height),
            isColor=True
        )

        frame_count = 0
        skip = int(frame)

        while True:
            ret, frame_data = video.read()
            if not ret:
                break

            frame_count += 1

            if frame_count % skip != 0:
                continue

            gray = cv2.cvtColor(frame_data, cv2.COLOR_BGR2GRAY)
            gray_rgb = cv2.cvtColor(gray, cv2.COLOR_GRAY2BGR)
            print(gray_rgb[100, 100])

            resized = cv2.resize(gray_rgb, (new_width, new_height))
            out.write(resized)

        print("Processing complete")
        out.release()
        video.release()
      `);
      console.log(output);
      const processedData = pyodide.FS.readFile("processed.mp4");
      const blob = new Blob([processedData], { type: "video/mp4" });
      const url = URL.createObjectURL(blob);

      document.getElementById("output").innerHTML =
        `<a href="${url}" download="processedFile.mp4">Download Link</a>`;
    }
  
  // These handle the labels under the slider bars to display the value the slider bar is set to
  changeSlider.addEventListener('change', () => {
    document.getElementById("changeSliderPercent").innerHTML = changeSlider.value + "% of pixels need to be different per frame to be considered movement";
  })
  compressionSlider.addEventListener('change', () => {
    document.getElementById("compressionSliderPercent").innerHTML = compressionSlider.value + "% of pixels are preserved after compression";
  })
  frameSlider.addEventListener('change', () => {
    document.getElementById("frameSliderCount").innerHTML = "1 frame in every " + frameSlider.value + " is analyzed";
  })

  // The event listener that detects file uploads, also triggers the pyodide python script
  fileInput.addEventListener('change', async (event) => {
    const file = event.target.files[0];
    if (!file) return;

    runPython(file, changeSlider.value, compressionSlider.value, frameSlider.value)

    const formData = new FormData();
    formData.append('TODO', "send file data to server");

    try {
      const response = await fetch('/upload', {
        method: 'POST',
        body: formData
      });

    } catch (err) {
      console.error('Error uploading file:', err);
    }
  });

  </script>
  </body>
</html>
